apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prowlarr
spec:
  parentRefs:
    - name: traefik-intranet
      namespace: traefik
  hostnames:
    - prowlarr.int.fivebytestudios.com
  rules:
    - backendRefs:
        - name: prowlarr
          port: 80
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: authelia
