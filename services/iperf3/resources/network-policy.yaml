apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: iperf3-server
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: iperf3
      app.kubernetes.io/name: iperf3
      app.kubernetes.io/component: server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - ipBlock:
            cidr: 192.168.0.0/24
      ports:
        - protocol: TCP
          port: test-tcp
        - protocol: UDP
          port: test-udp
  egress:
    - to:
        - ipBlock:
            cidr: 192.168.0.0/24
      ports:
        - protocol: UDP
          port: 5201
