apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-assistant
  namespace: argocd
spec:
  project: {{ .Values.project.name }}
  source:
    repoURL: {{ .Values.source.repoURL }}
    targetRevision: {{ .Values.source.targetRevision }}
    path: {{ .Values.project.path }}/home-assistant
    helm:
      valueFiles:
        - values.yaml
      valuesObject:
        httpRoute:
          hostname: "home-assistant.{{ .Values.domain.intranet }}"
        home-assistant:
          service:
            type: LoadBalancer
            annotations:
              metallb.io/loadBalancerIPs: {{ .Values.ipAddress.homeAssistant }}
              metallb.io/allow-shared-ip: home-assistant
          # Enable COIOT for Shelly
          additionalPorts:
            - name: coiot
              containerPort: 5683
              protocol: UDP
          additionalServices:
            - name: coiot
              port: 5683
              targetPort: coiot
              type: LoadBalancer
              protocol: UDP
              annotations:
                metallb.io/loadBalancerIPs: {{ .Values.ipAddress.homeAssistant }}
                metallb.io/allow-shared-ip: home-assistant
  destination:
    namespace: home-assistant
    server: {{ .Values.destination.server }}
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
