repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: local
    hooks:
      - id: check-helm
        name: "check helm"
        files: ".*\\.yaml"
        entry: scripts/check-helm.sh
        language: script
        pass_filenames: false
      - id: check-kustomize
        name: "check kustomize"
        files: ".*\\.yaml"
        entry: scripts/check-kustomize.sh
        language: script
        pass_filenames: false
