apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
- https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.3/manifests/install.yaml
# argocd-server-applications allows argocd-server to manage applications in all namespaces
# See https://argo-cd.readthedocs.io/en/stable/operator-manual/app-any-namespace/#adapt-kubernetes-rbac
- https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.3/examples/k8s-rbac/argocd-server-applications/argocd-server-rbac-clusterrole.yaml
- https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.3/examples/k8s-rbac/argocd-server-applications/argocd-server-rbac-clusterrolebinding.yaml
- https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.3/examples/k8s-rbac/argocd-server-applications/argocd-notifications-controller-rbac-clusterrole.yaml
- https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.3/examples/k8s-rbac/argocd-server-applications/argocd-notifications-controller-rbac-clusterrolebinding.yaml
- grpcroute.yaml
- httproute.yaml
- github-webhook-httproute.yaml
- github-webhook-ipallow-middleware.yaml
- github-webhook-secret.yaml
- gitlab-webhook-httproute.yaml
- gitlab-webhook-ipallow-middleware.yaml
- gitlab-webhook-secret.yaml
patches:
- path: argocd-cm.yaml
- path: argocd-cmd-params-cm.yaml
- path: argocd-rbac-cm.yaml
- path: argocd-secret.yaml
