apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: Gateway	
      name: traefik-intranet
      namespace: traefik
  hostnames:
    - argocd.int.fivebytestudios.com
  rules:
    - backendRefs:
        - group: ''	
          kind: Service	
          name: argocd-server
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
