apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: github-webhook
spec:
  parentRefs:
    - name: traefik-external
      namespace: traefik
  hostnames:
    - github-webhook.argocd.wildfreddy.fivebytestudios.com
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
      matches:
        - path:
            type: Exact
            value: /api/webhook
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: github-webhook-ipallow
