dashboard:
  hostname: null
traefik:
  # started from https://doc.traefik.io/traefik/v3.4/setup/kubernetes/
  # https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml
  instanceLabelOverride: traefik

  # Configure Network Ports and EntryPoints
  # EntryPoints are the network listeners for incoming traffic.
  ports:
    web:
      port: 80
      http:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            permanent: true
    websecure:
      port: 443
    web-ext:
      port: 9080
      exposedPort: 80
      expose:
        external: true
      http:
        redirections:
          entryPoint:
            to: websecure-ext
            scheme: https
            permanent: true
    websecure-ext:
      port: 9443
      exposedPort: 443
      expose:
        external: true

  service:
    spec:
      # Preserve client IP addresses
      externalTrafficPolicy: Local
    additionalServices:
      external:
        type: LoadBalancer
        spec:
          # Preserve client IP addresses
          externalTrafficPolicy: Local

  # Enables the dashboard in Secure Mode
  api:
    dashboard: true
    insecure: false

  ingressClass:
    enabled: true
    isDefaultClass: false

  gatewayClass:
    enabled: true

  gateway:
    enabled: false

  deployment:
    replicas: 3

  # try to keep replicas in different node availability zones
  topologySpreadConstraints:
    - labelSelector:
        matchLabels:
          app.kubernetes.io/name: traefik
          app.kubernetes.io/instance: traefik
      topologyKey: topology.kubernetes.io/zone
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway
    - labelSelector:
        matchLabels:
          app.kubernetes.io/name: traefik
          app.kubernetes.io/instance: traefik
      topologyKey: kubernetes.io/hostname
      maxSkew: 1
      whenUnsatisfiable: DoNotSchedule

  # Providers controls which resources Traefik watches to find routing configuration.
  providers:
    # traefik IngressRoute
    kubernetesCRD:
      enabled: true
    kubernetesIngress:
      enabled: true
    kubernetesGateway:
      enabled: true
      statusAddress:
        service:
          enabled: false
  logs:
    general:
      level: INFO
    # This enables access logs, outputting them to Traefik's standard output by default.
    # The [Access Logs Documentation](https://doc.traefik.io/traefik/observability/access-logs/) covers formatting, filtering, and output options.
    access:
      enabled: true

  # Enables Prometheus metrics
  metrics:
    prometheus:
      service:
        enabled: true
      serviceMonitor:
        enabled: true

  tracing:
    otlp:
      enabled: true
      grpc:
        enabled: true
        endpoint: "tempo-distributor.tempo.svc.cluster.local:4317"
        insecure: true
