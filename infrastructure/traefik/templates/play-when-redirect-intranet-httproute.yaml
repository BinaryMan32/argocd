{{- if .Values.playWhenRedirect.intranet.hostnames }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: play-when-redirect-intranet
spec:
  parentRefs:
    - name: traefik-intranet
      sectionName: web
  hostnames:
    {{- toYaml .Values.playWhenRedirect.intranet.hostnames | nindent 4 }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.playWhenRedirect.intranet.pathPrefix }}
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
{{- end }}
