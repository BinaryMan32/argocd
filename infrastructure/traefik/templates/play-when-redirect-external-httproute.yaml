{{- if .Values.playWhenRedirect.external.hostnames }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: play-when-redirect-external
spec:
  parentRefs:
    - name: traefik-external
      sectionName: http
  hostnames:
    {{- toYaml .Values.playWhenRedirect.external.hostnames | nindent 4 }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.playWhenRedirect.external.pathPrefix }}
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
{{- end }}
