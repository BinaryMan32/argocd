apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: traefik-intranet
  annotations:
    cert-manager.io/cluster-issuer: intranet-dns01-prod
spec:
  gatewayClassName: traefik
  listeners:
{{- range $name, $listener := .Values.intranet.gateway.listeners.https }}
    - name: {{ $name }}
      port: 443
      protocol: HTTPS
      hostname: {{ $listener.hostname }}
      allowedRoutes:
{{- if $listener.namespace }}
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $listener.namespace }}
{{- else }}
        namespaces:
          from: Same
{{- end }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ default (printf "%s-tls" $name) $listener.certificateRef }}
{{- end }}
{{- range $name, $listener := .Values.intranet.gateway.listeners.http }}
    - name: {{ $name }}
      port: 80
      protocol: HTTP
      hostname: {{ $listener.hostname }}
      allowedRoutes:
{{- if $listener.namespace }}
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $listener.namespace }}
{{- else }}
        namespaces:
          from: Same
{{- end }}
{{- end }}
    - name: web
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
