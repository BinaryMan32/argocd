apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: traefik-intranet
  annotations:
    cert-manager.io/cluster-issuer: intranet-dns01-prod
spec:
  gatewayClassName: traefik
  listeners:
    - name: jaeger
      port: 443
      protocol: HTTPS
      hostname: jaeger.int.fivebytestudios.com
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: jaeger
      tls:
        mode: Terminate
        certificateRefs:
          - name: jaeger-tls
    - name: traefik-dashboard
      port: 443
      protocol: HTTPS
      hostname: traefik.int.fivebytestudios.com
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - name: traefik-dashboard-tls
    - name: web
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
