apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: traefik-dashboard
spec:
  parentRefs:
    - name: traefik-intranet
  hostnames:
    - "{{ .Values.dashboard.hostname }}"
  rules:
    - backendRefs:
        - name: api@internal
          kind: TraefikService
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: authelia
