apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure-project-app
  namespace: argocd
spec:
  project: default
  syncPolicy:
    automated: {}
  source:
    repoURL: https://github.com/BinaryMan32/argocd.git
    targetRevision: main
    path: infrastructure/infrastructure
    helm:
      valueFiles:
        - values.yaml
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      name: longhorn
      jsonPointers:
        - /metadata/finalizers/pre-delete-finalizer.argocd.argoproj.io
        - /metadata/finalizers/pre-delete-finalizer.argocd.argoproj.io~1cleanup
