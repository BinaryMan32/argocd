apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project.name }}
  source:
    repoURL: https://github.com/longhorn/longhorn
    targetRevision: v1.11.1
    path: chart
    helm:
      # https://github.com/longhorn/longhorn/blob/master/chart/values.yaml
      valuesObject:
        global:
          tolerations:
            - key: reserved-arch
              operator: Equal
              value: amd64
              effect: NoSchedule
        extraObjects:
          # TODO use httproute from chart if it supports filters
          - apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            metadata:
              name: longhorn
            spec:
              parentRefs:
                - group: gateway.networking.k8s.io
                  kind: Gateway
                  name: traefik-intranet
                  namespace: traefik
              hostnames:
                - "longhorn.{{ .Values.domain.intranet }}"
              rules:
                - backendRefs:
                    - name: longhorn-frontend
                      port: 80
                  filters:
                    - type: ExtensionRef
                      extensionRef:
                        group: traefik.io
                        kind: Middleware
                        name: authelia
          - apiVersion: traefik.io/v1alpha1
            kind: Middleware
            metadata:
              name: authelia
            spec:
              chain:
                middlewares:
                  - name: authelia-forwardauth
                    namespace: auth
        longhornUI:
          replicas: 1
        persistence:
          defaultClass: false
          reclaimPolicy: Retain
        defaultBackupStore:
          backupTarget: nfs://{{ .Values.nfs.server }}:{{ .Values.nfs.path }}/manual/longhorn-backup
        defaultSettings:
          concurrentAutomaticEngineUpgradePerNodeLimit: "1"
          taintToleration: reserved-arch=amd64:NoSchedule
        # Required for longhorn 1.11.0 node validator hot fix
        # Revert on next update
        # https://longhorn.io/docs/1.11.0/important-notes/#longhorn-manager-image
        preUpgradeChecker:
          upgradeVersionCheck: false
  # helm template incorrectly sets nodePort for LoadBalancer
  ignoreDifferences:
    - kind: Service
      namespace: longhorn-system
      name: longhorn-frontend
      jsonPointers:
        - /spec/ports/0/nodePort
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: engineimages.longhorn.io
      jsonPointers:
        - /spec/preserveUnknownFields
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: engines.longhorn.io
      jsonPointers:
        - /spec/preserveUnknownFields
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: instancemanagers.longhorn.io
      jsonPointers:
        - /spec/preserveUnknownFields
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: nodes.longhorn.io
      jsonPointers:
        - /spec/preserveUnknownFields
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: replicas.longhorn.io
      jsonPointers:
        - /spec/preserveUnknownFields
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: settings.longhorn.io
      jsonPointers:
        - /spec/preserveUnknownFields
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: volumes.longhorn.io
      jsonPointers:
        - /spec/preserveUnknownFields
  destination:
    namespace: longhorn-system
    server: {{ .Values.destination.server }}
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
