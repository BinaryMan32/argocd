apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seaweedfs
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project.name }}
  source:
    repoURL: {{ .Values.source.repoURL }}
    targetRevision: {{ .Values.source.targetRevision }}
    path: "{{ .Values.project.path }}/seaweedfs"
    helm:
      valueFiles:
        - values.yaml
      valuesObject:
        # https://github.com/seaweedfs/seaweedfs/blob/master/k8s/charts/seaweedfs/values.yaml
        admin:
          httpRoute:
            hostnames:
              - seaweedfs-admin.{{ .Values.domain.intranet }}
        s3:
          httpRoute:
            hostnames:
              - seaweedfs-s3.{{ .Values.domain.intranet }}
  destination:
    namespace: seaweedfs
    server: {{ .Values.destination.server }}
  syncPolicy:
    # automated: {}
    syncOptions:
      - CreateNamespace=true
