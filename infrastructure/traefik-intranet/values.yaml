dashboard:
  intranet:
    hostname: null
traefik:
  # started from https://doc.traefik.io/traefik/v3.4/setup/kubernetes/
  # https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml
  instanceLabelOverride: traefik-intranet

  # Configure Network Ports and EntryPoints
  # EntryPoints are the network listeners for incoming traffic.
  ports:
    web:
      port: 80
      http:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            permanent: true
    websecure:
      port: 443

  service:
    spec:
      # Preserve client IP addresses
      externalTrafficPolicy: Local

  # Enables the dashboard in Secure Mode
  api:
    dashboard: true
    insecure: false

  ingressClass:
    enabled: true
    isDefaultClass: false
    name: traefik-intranet

  gatewayClass:
    enabled: true
    name: traefik-intranet

  gateway:
    name: traefik-intranet
    annotations:
      cert-manager.io/cluster-issuer: intranet-dns01-prod
    listeners:
      web:
        port: 80
        protocol: HTTP
        namespacePolicy:
          from: All

      jaeger:
        port: 443
        protocol: HTTPS
        mode: Terminate
        hostname: jaeger.int.fivebytestudios.com
        certificateRefs:    
          - name: jaeger-tls
        namespacePolicy:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: jaeger

      traefik-dashboard-intranet:
        port: 443
        protocol: HTTPS
        mode: Terminate
        certificateRefs:    
          - name: traefik-dashboard-intranet-tls
        namespacePolicy:
          from: Same

      traefik-dashboard-external:
        port: 443
        protocol: HTTPS
        mode: Terminate
        certificateRefs:    
          - name: traefik-dashboard-external-tls
        namespacePolicy:
          from: Same

  deployment:
    replicas: 3

  # try to keep replicas in different node availability zones
  topologySpreadConstraints:
    - labelSelector:
        matchLabels:
          app.kubernetes.io/name: traefik
          app.kubernetes.io/instance: traefik-intranet
      topologyKey: topology.kubernetes.io/zone
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway
    - labelSelector:
        matchLabels:
          app.kubernetes.io/name: traefik
          app.kubernetes.io/instance: traefik-intranet
      topologyKey: kubernetes.io/hostname
      maxSkew: 1
      whenUnsatisfiable: DoNotSchedule

  # Providers controls which resources Traefik watches to find routing configuration.
  providers:
    # traefik IngressRoute
    kubernetesCRD:
      enabled: true
    kubernetesIngress:
      enabled: true
      ingressClass: traefik-intranet
    kubernetesGateway:
      enabled: true

  logs:
    general:
      level: INFO
    # This enables access logs, outputting them to Traefik's standard output by default.
    # The [Access Logs Documentation](https://doc.traefik.io/traefik/observability/access-logs/) covers formatting, filtering, and output options.
    access:
      enabled: true

  # Enables Prometheus metrics
  metrics:
    prometheus:
      service:
        enabled: true
      serviceMonitor:
        enabled: true

  tracing:
    otlp:
      enabled: true
      grpc:
        enabled: true
        endpoint: "tempo-distributor.tempo.svc.cluster.local:4317"
        insecure: true
