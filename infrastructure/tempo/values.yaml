tempo-distributed:
  # https://github.com/grafana-community/helm-charts/blob/main/charts/tempo-distributed/values.yaml
  global:
    extraEnvFrom:
      - secretRef:
          name: seaweedfs-tempo
        prefix: TRACE_S3_
  ingester:
    extraArgs:
      # expand environment variables in the config file, such as s3 credentials below
      - "-config.expand-env=true"
  distributor:
    extraArgs:
      # expand environment variables in the config file, such as s3 credentials below
      - "-config.expand-env=true"
  compactor:
    extraArgs:
      # expand environment variables in the config file, such as s3 credentials below
      - "-config.expand-env=true"
  querier:
    extraArgs:
      # expand environment variables in the config file, such as s3 credentials below
      - "-config.expand-env=true"
  queryFrontend:
    extraArgs:
      # expand environment variables in the config file, such as s3 credentials below
      - "-config.expand-env=true"
  storage:
    trace:
      backend: s3
      s3:
        access_key: "${TRACE_S3_ACCESS_KEY}"
        secret_key: "${TRACE_S3_SECRET_KEY}"
        bucket: "tempo-traces"
        endpoint: seaweedfs-s3.seaweedfs.svc.cluster.local:8333
        insecure: true
  # Specifies which trace protocols to accept by the gateway.
  traces:
    otlp:
      grpc:
        enabled: true
      http:
        enabled: true
