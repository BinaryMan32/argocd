{{- with .Values.s3.httpRoute }}
{{- if .enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seaweedfs-s3
spec:
  parentRefs:
    {{- toYaml .parentRefs | nindent 4 }}
  hostnames:
    {{- toYaml .hostnames | nindent 4 }}
  rules:
    - backendRefs:
        - name: seaweedfs-s3
          port: 8333
      {{- with .filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
